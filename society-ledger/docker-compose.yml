version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - sl-network

x-java-defaults: &java-defaults
  <<: *service-defaults
  build:
    context: .
  environment:
    DB_USERNAME: sl_user
    DB_PASSWORD: sl_pass
    JWT_SECRET: society-ledger-super-secret-key-must-be-at-least-256-bits-long-for-hs256
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    SOCIETY_SERVICE_URL: http://society-service:8082
    FINANCE_SERVICE_URL: http://finance-service:8083
    STATEMENT_SERVICE_URL: http://statement-service:8084
    RECEIPT_SERVICE_URL: http://receipt-service:8085
    AUDIT_SERVICE_URL: http://audit-service:8086
    QUERY_SERVICE_URL: http://query-service:8087
    FILE_STORAGE_PATH: /data/society-ledger

services:
  # ─────────────────────────── Infrastructure ───────────────────────────

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: sl-postgres
    environment:
      POSTGRES_USER: sl_user
      POSTGRES_PASSWORD: sl_pass
      POSTGRES_MULTIPLE_DATABASES: auth_db,society_db,finance_db,statement_db,receipt_db,audit_db,query_db,notification_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sl_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.0
    container_name: sl-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    <<: *service-defaults
    image: provectuslabs/kafka-ui:latest
    container_name: sl-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: society-ledger
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────────────────── Backend Services ─────────────────────────

  api-gateway:
    <<: *java-defaults
    container_name: sl-api-gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      SOCIETY_SERVICE_URL: http://society-service:8082
      FINANCE_SERVICE_URL: http://finance-service:8083
      STATEMENT_SERVICE_URL: http://statement-service:8084
      RECEIPT_SERVICE_URL: http://receipt-service:8085
      AUDIT_SERVICE_URL: http://audit-service:8086
      QUERY_SERVICE_URL: http://query-service:8087

  auth-service:
    <<: *java-defaults
    container_name: sl-auth-service
    build:
      dockerfile: auth-service/Dockerfile
      context: .
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      NOTIFICATION_SERVICE_URL: http://notification-service:8088

  society-service:
    <<: *java-defaults
    container_name: sl-society-service
    build:
      dockerfile: society-service/Dockerfile
      context: .
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/society_db
    volumes:
      - file-storage:/data/society-ledger

  finance-service:
    <<: *java-defaults
    container_name: sl-finance-service
    build:
      dockerfile: finance-service/Dockerfile
      context: .
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finance_db
    volumes:
      - file-storage:/data/society-ledger

  statement-service:
    <<: *java-defaults
    container_name: sl-statement-service
    build:
      dockerfile: statement-service/Dockerfile
      context: .
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/statement_db
    volumes:
      - file-storage:/data/society-ledger

  receipt-service:
    <<: *java-defaults
    container_name: sl-receipt-service
    build:
      dockerfile: receipt-service/Dockerfile
      context: .
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/receipt_db

  audit-service:
    <<: *java-defaults
    container_name: sl-audit-service
    build:
      dockerfile: audit-service/Dockerfile
      context: .
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit_db
    volumes:
      - file-storage:/data/society-ledger

  query-service:
    <<: *java-defaults
    container_name: sl-query-service
    build:
      dockerfile: query-service/Dockerfile
      context: .
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/query_db

  notification-service:
    <<: *java-defaults
    container_name: sl-notification-service
    build:
      dockerfile: notification-service/Dockerfile
      context: .
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@societyledger.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

  # ─────────────────────────── Frontend ─────────────────────────────────

  society-ledger-ui:
    <<: *service-defaults
    container_name: sl-ui
    build:
      context: ./society-ledger-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres-data:
  kafka-data:
  zookeeper-data:
  file-storage:

networks:
  sl-network:
    driver: bridge
