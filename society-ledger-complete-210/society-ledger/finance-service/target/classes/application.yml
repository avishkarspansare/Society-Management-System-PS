server:
  port: 8083

spring:
  application:
    name: finance-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:/finance_db}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_d4Z1MlrEazfX}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

app:
  jwt:
    secret: ${JWT_SECRET:society-ledger-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
  society-service:
    url: ${SOCIETY_SERVICE_URL:http://localhost:8082}
  statement-service:
    url: ${STATEMENT_SERVICE_URL:http://localhost:8084}
  file-storage:
    base-path: ${FILE_STORAGE_PATH:${user.home}/society-ledger}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.societyledger: INFO
    org.springframework.security: WARN
