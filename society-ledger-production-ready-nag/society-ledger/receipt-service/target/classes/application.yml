server:
  port: 8085

spring:
  application:
    name: receipt-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/receipt_db}
    username: ${DB_USERNAME:sl_user}
    password: ${DB_PASSWORD:sl_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  society-service:
    url: ${SOCIETY_SERVICE_URL:http://localhost:8082}
  receipt:
    storage-dir: ${RECEIPT_STORAGE_DIR:/app/data/receipts}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.societyledger: INFO
