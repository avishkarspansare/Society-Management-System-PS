# docker-compose.override.yml
# Local development overrides — applied automatically alongside docker-compose.yml
# Do NOT commit secrets. Copy .env.example to .env and fill in values.

version: '3.9'

services:
  # Enable debug logging in dev
  auth-service:
    environment:
      SPRING_PROFILES_ACTIVE: default
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Dspring.profiles.active=default

  finance-service:
    environment:
      SPRING_PROFILES_ACTIVE: default

  statement-service:
    environment:
      SPRING_PROFILES_ACTIVE: default

  # In dev, expose Kafka externally for debugging
  kafka:
    ports:
      - "9092:9092"
