# Production profile — Neon PostgreSQL
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}   # Neon connection string
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    properties:
      hibernate:
        default_schema: notification
  flyway:
    schemas: notification
    default-schema: notification

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

logging:
  level:
    com.societyledger: INFO
    org.flywaydb: INFO
