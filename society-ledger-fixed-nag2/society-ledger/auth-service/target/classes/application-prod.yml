# Production profile — Neon PostgreSQL
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}   # Neon connection string
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    properties:
      hibernate:
        default_schema: auth
  flyway:
    schemas: auth
    default-schema: auth

logging:
  level:
    com.societyledger: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
