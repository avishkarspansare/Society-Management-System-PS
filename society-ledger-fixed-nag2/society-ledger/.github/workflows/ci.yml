name: Society Ledger CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────── Build & Test ───────────────
  build:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - common-lib
          - auth-service
          - society-service
          - finance-service
          - statement-service
          - receipt-service
          - audit-service
          - query-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test ${{ matrix.service }}
        run: |
          mvn verify -pl common-lib,${{ matrix.service }} -am \
            -Dspring.profiles.active=test \
            --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
          JWT_SECRET: test-secret-key-that-is-at-least-256-bits-long-for-ci

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  # ─────────────── Docker Build ───────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (no push)
        run: |
          services=(api-gateway auth-service society-service finance-service \
                    statement-service receipt-service audit-service \
                    query-service notification-service)
          for svc in "${services[@]}"; do
            echo "Building $svc..."
            docker build -t society-ledger/$svc:ci ./$svc --quiet
          done
