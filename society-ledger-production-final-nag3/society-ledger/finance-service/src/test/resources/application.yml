# Test profile — H2 in-memory database
# Activated automatically by spring.profiles.active=test
spring:
  datasource:
    url: jdbc:h2:mem:finance_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: finance
  flyway:
    enabled: false   # use ddl-auto for tests

logging:
  level:
    com.societyledger: DEBUG
    org.hibernate.SQL: DEBUG
