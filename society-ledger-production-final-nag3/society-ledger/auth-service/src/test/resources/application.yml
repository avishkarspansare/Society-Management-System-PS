spring:
  datasource:
    url: jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: auth

  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key-123456
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000

  society-service:
    url: http://localhost:8082

logging:
  level:
    com.societyledger: DEBUG
    org.hibernate.SQL: DEBUG