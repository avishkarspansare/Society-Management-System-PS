# Development Profile -- local Docker PostgreSQL + local Kafka
# Activated with: SPRING_PROFILES_ACTIVE=dev
# Uses default values for local development; override via .env

spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neondb}"
    username: "${DB_USERNAME:sl_user}"
    password: "${DB_PASSWORD:sl_pass}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: auth-service-dev-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: auth
    default-schema: auth

  mail:
    host: "${MAIL_HOST:smtp.gmail.com}"
    port: 587
    username: "${MAIL_USERNAME:dev@societyledger.com}"
    password: "${MAIL_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    com.societyledger: DEBUG
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
