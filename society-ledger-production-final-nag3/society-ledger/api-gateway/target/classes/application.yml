server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"      # Vite dev server
              - "http://localhost:80"        # Docker frontend
              - "http://localhost"           # Docker frontend (no port)
              - "https://app.societyledger.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        # ── Auth Service (public — no JWT filter) ─────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          # Rate limiting: add spring-boot-starter-data-redis for production
          # filters:
          #   - name: RequestRateLimiter
          #     args:
          #       redis-rate-limiter.replenishRate: 10
          #       redis-rate-limiter.burstCapacity: 20

        # ── Internal Feign routes (bypass JwtAuth — Docker network only) ──
        - id: society-service-internal
          uri: ${SOCIETY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/internal/society/**

        - id: statement-service-internal
          uri: ${STATEMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/internal/statements/**

        - id: receipt-service-internal
          uri: ${RECEIPT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/internal/receipts/**

        # ── Society Service ────────────────────────────────────
        - id: society-service
          uri: ${SOCIETY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/societies/**
          filters:
            - JwtAuth

        # ── Finance Service ────────────────────────────────────
        - id: finance-service
          uri: ${FINANCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/finance/**
          filters:
            - JwtAuth

        # ── Statement Service ──────────────────────────────────
        - id: statement-service
          uri: ${STATEMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/statements/**
          filters:
            - JwtAuth

        # ── Receipt Service ────────────────────────────────────
        - id: receipt-service
          uri: ${RECEIPT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/receipts/**
          filters:
            - JwtAuth

        # ── Audit Service ──────────────────────────────────────
        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/audit/**
          filters:
            - JwtAuth

        # ── Query Service ──────────────────────────────────────
        - id: query-service
          uri: ${QUERY_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/queries/**
          filters:
            - JwtAuth

app:
  jwt:
    secret: ${JWT_SECRET:society-ledger-super-secret-key-must-be-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.societyledger: INFO
