version: '3.9'

# Society Ledger — Docker Compose
# Local development: single PostgreSQL with schema isolation (mirrors Neon)
#
# Usage:
#   cp .env.example .env        # fill in secrets
#   docker compose up --build
#
# For Neon production, set SPRING_PROFILES_ACTIVE=prod and provide
# SPRING_DATASOURCE_URL pointing to your Neon connection string.

services:

  # ─────────────── Infrastructure ──────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: sl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sl_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      POSTGRES_DB: neondb        # single database — same name as Neon
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sl_user -d neondb"]
      interval: 10s
      timeout: 5s
      start-period: 20s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: sl-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      start-period: 30s
      retries: 5

  # ─────────────── Microservices ───────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: sl-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      AUTH_SERVICE_URL: http://auth-service:8081
      SOCIETY_SERVICE_URL: http://society-service:8082
      FINANCE_SERVICE_URL: http://finance-service:8083
      STATEMENT_SERVICE_URL: http://statement-service:8084
      RECEIPT_SERVICE_URL: http://receipt-service:8085
      AUDIT_SERVICE_URL: http://audit-service:8086
      QUERY_SERVICE_URL: http://query-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    depends_on:
      auth-service:
        condition: service_healthy
      society-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 20s
      retries: 3

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: sl-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      SOCIETY_SERVICE_URL: http://society-service:8082
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5

  society-service:
    build:
      context: ./society-service
      dockerfile: Dockerfile
    container_name: sl-society-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5

  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: sl-finance-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      SOCIETY_SERVICE_URL: http://society-service:8082
      STATEMENT_SERVICE_URL: http://statement-service:8084
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EXPENSE_STORAGE_DIR: /app/data/expense-proofs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5
    volumes:
      - file_storage:/app/data

  statement-service:
    build:
      context: ./statement-service
      dockerfile: Dockerfile
    container_name: sl-statement-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      SOCIETY_SERVICE_URL: http://society-service:8082
      RECEIPT_SERVICE_URL: http://receipt-service:8085
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STATEMENT_STORAGE_DIR: /app/data/statements
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5
    volumes:
      - file_storage:/app/data

  receipt-service:
    build:
      context: ./receipt-service
      dockerfile: Dockerfile
    container_name: sl-receipt-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      SOCIETY_SERVICE_URL: http://society-service:8082
      STATEMENT_SERVICE_URL: http://statement-service:8084
      RECEIPT_STORAGE_DIR: /app/data/receipts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5
    volumes:
      - file_storage:/app/data

  audit-service:
    build:
      context: ./audit-service
      dockerfile: Dockerfile
    container_name: sl-audit-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUDIT_STORAGE_DIR: /app/data/audit-reports
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5
    volumes:
      - file_storage:/app/data

  query-service:
    build:
      context: ./query-service
      dockerfile: Dockerfile
    container_name: sl-query-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-society-ledger-jwt-secret-min-256-bits-change-in-production}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: sl-notification-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      DB_USERNAME: sl_user
      DB_PASSWORD: ${DB_PASSWORD:-sl_pass_2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 5

  # ─────────────── Frontend ────────────────────────────────────

  frontend:
    build:
      context: ./society-ledger-ui
      dockerfile: Dockerfile
    container_name: sl-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  pg_data:
  kafka_data:
  file_storage:
